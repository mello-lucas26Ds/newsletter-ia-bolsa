name: Newsletter IA Bolsa — Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'
    - cron: '0 21 * * 1-5'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Executar pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.1-8b-instant' }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          MAX_NOTICIAS_POR_EXECUCAO: ${{ secrets.MAX_NOTICIAS_POR_EXECUCAO || '10' }}
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'github-actions-secret' }}
        run: python -m app.services.pipeline
      
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/ index.html static/ || true
          git diff --cached --quiet || git commit -m "update: newsletter $(date +%Y-%m-%d) [bot]"
          git push || true